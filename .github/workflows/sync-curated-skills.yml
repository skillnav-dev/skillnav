name: Sync Curated Skills

on:
  schedule:
    - cron: "0 1 * * 1" # UTC 01:00 Monday = Beijing 09:00, before freshness refresh
  workflow_dispatch:
    inputs:
      repo:
        description: "Sync specific repo (e.g. anthropics/skills)"
        required: false
      source:
        description: "Source to sync"
        type: choice
        options:
          - all
          - curated
          - awesome-list
          - skills-sh
        default: "all"
      incremental:
        description: "Incremental sync (skip existing)"
        type: boolean
        default: true
      evaluate:
        description: "Run LLM evaluation on new skills"
        type: boolean
        default: false
      limit:
        description: "Max items per repo"
        required: false
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: false

concurrency:
  group: sync-curated-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      LLM_PROVIDER: deepseek
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync curated skills
        run: |
          ARGS="--incremental"
          if [ "${{ inputs.repo }}" ]; then ARGS="$ARGS --repo ${{ inputs.repo }}"; fi
          if [ "${{ inputs.incremental }}" = "false" ]; then ARGS="${ARGS/--incremental/}"; fi
          if [ "${{ inputs.source }}" ] && [ "${{ inputs.source }}" != "all" ]; then ARGS="$ARGS --source ${{ inputs.source }}"; fi
          if [ "${{ inputs.evaluate }}" = "true" ]; then ARGS="$ARGS --evaluate"; fi
          if [ "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/sync-curated-skills.mjs $ARGS

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Sync Curated Skills* failed\\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
