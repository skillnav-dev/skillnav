name: Sync Skills

on:
  schedule:
    - cron: "0 2 * * 1" # UTC 02:00 Monday = Beijing 10:00
  workflow_dispatch:
    inputs:
      skip_existing:
        description: "Skip existing skills (incremental)"
        type: boolean
        default: true
      backfill_content:
        description: "Backfill NULL content from GitHub"
        type: boolean
        default: false
      limit:
        description: "Max items to process"
        required: false
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: false

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  clawhub:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync ClawHub skills
        run: |
          ARGS=""
          if [ "${{ inputs.backfill_content }}" = "true" ]; then
            ARGS="$ARGS --backfill-content"
          elif [ "${{ inputs.skip_existing }}" != "false" ]; then
            ARGS="$ARGS --skip-existing"
          fi
          if [ "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/sync-clawhub.mjs $ARGS

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Sync Skills (ClawHub)* failed\\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

  anthropic:
    needs: clawhub
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync Anthropic skills
        run: |
          ARGS=""
          if [ "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/sync-anthropic-skills.mjs $ARGS

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Sync Skills (Anthropic)* failed\\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
