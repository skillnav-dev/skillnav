name: Sync Articles

on:
  schedule:
    - cron: "0 0 * * *" # UTC 00:00 = Beijing 08:00, daily
  workflow_dispatch:
    inputs:
      source:
        description: "Source filter (anthropic/openai/langchain/simonw/google-ai/github/huggingface/crewai/techcrunch-ai)"
        required: false
      limit:
        description: "Max items per source"
        required: false
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: false

concurrency:
  group: sync-articles
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
      LLM_PROVIDER: gpt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync articles
        run: |
          ARGS=""
          if [ "${{ inputs.source }}" ]; then ARGS="$ARGS --source ${{ inputs.source }}"; fi
          if [ "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/sync-articles.mjs $ARGS

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Sync Articles* failed\\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
