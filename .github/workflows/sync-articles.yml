name: Sync Articles

on:
  schedule:
    - cron: "15 22 * * *" # UTC 22:15 = CST 06:15, morning batch
    - cron: "15 10 * * *" # UTC 10:15 = CST 18:15, afternoon batch
  workflow_dispatch:
    inputs:
      source:
        description: "Source filter (anthropic/openai/langchain/simonw/github/huggingface/crewai/latent-space/ai-coding-daily/thenewstack/google-ai/together-ai/lobsters/cloudflare)"
        required: false
      limit:
        description: "Max items per source"
        required: false
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: false

concurrency:
  group: sync-articles
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
      LLM_PROVIDER: deepseek
      LLM_FALLBACK_PROVIDER: gpt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync articles
        id: sync
        run: |
          ARGS=""
          if [ "${{ inputs.source }}" ]; then ARGS="$ARGS --source ${{ inputs.source }}"; fi
          if [ "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/sync-articles.mjs $ARGS

      - name: Notify Slack on success
        if: success()
        run: |
          LABEL="采集"
          if [ "${{ github.event.schedule }}" = "15 22 * * *" ]; then LABEL="晨间采集"; fi
          if [ "${{ github.event.schedule }}" = "15 10 * * *" ]; then LABEL="午后采集"; fi
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ *SkillNav ${LABEL}完成*\n+${{ steps.sync.outputs.inserted }} 篇 | 跳过 ${{ steps.sync.outputs.skipped }} | 失败 ${{ steps.sync.outputs.failed }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Sync Articles* failed\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
