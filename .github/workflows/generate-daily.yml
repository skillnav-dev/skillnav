name: Generate Daily Brief

on:
  workflow_run:
    workflows: ["Sync Articles"]
    types: [completed]
  workflow_dispatch:
    inputs:
      hours:
        description: "Look back hours (default 24)"
        required: false
      skip_signals:
        description: "Skip signal scraping"
        type: boolean
        default: false
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: false

concurrency:
  group: generate-daily
  cancel-in-progress: false

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER: deepseek
      LLM_FALLBACK_PROVIDER: gemini
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Scrape daily signals
        if: inputs.skip_signals != 'true'
        run: node scripts/scrape-signals.mjs || echo "Signal scraping failed, continuing without signals"

      - name: Generate daily brief
        run: |
          ARGS=""
          if [ "${{ inputs.hours }}" ]; then ARGS="$ARGS --hours ${{ inputs.hours }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/generate-daily.mjs $ARGS

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Generate Daily Brief* failed\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
