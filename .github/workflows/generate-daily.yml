name: Generate Daily Brief

on:
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = CST 07:00, after morning article sync
  workflow_dispatch:
    inputs:
      hours:
        description: "Look back hours (default 24)"
        required: false
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: false

concurrency:
  group: generate-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LLM_PROVIDER: deepseek
      LLM_FALLBACK_PROVIDER: gemini
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate daily brief
        run: |
          ARGS=""
          if [ "${{ inputs.hours }}" ]; then ARGS="$ARGS --hours ${{ inputs.hours }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/generate-daily.mjs $ARGS

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *Generate Daily Brief* failed\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
